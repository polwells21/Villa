<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Usuario</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="login-page">

    <div class="login-container">

        <div class="login-box">

            <h1 class="title">Crear Cuenta</h1>
            <p class="subtitle">Yoga Studio</p>

            <form>

                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ingresa tu nombre" required>

                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" placeholder="correo@ejemplo.com" required>

                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" placeholder="Nombre de usuario" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Crea una contraseña" required>

                <button type="submit">Crear Cuenta</button>

            </form>

            <div class="links">
                <a href="index.html">Volver al Login</a>
            </div>

        </div>

    </div>

</body>
</html>
